<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background square with rounded corners -->
  <rect width="32" height="32" rx="7" fill="#0e0e0e"/>
  <!-- Teal accent bar on left side -->
  <rect x="4" y="6" width="3" height="20" rx="1.5" fill="#00C2C2"/>
  <!-- Letter L -->
  <rect x="9" y="7" width="2.5" height="12" rx="1" fill="#eef4f4"/>
  <rect x="9" y="17" width="7" height="2.5" rx="1" fill="#eef4f4"/>
  <!-- & symbol simplified as a dot + line -->
  <circle cx="19.5" cy="12" r="1.5" fill="#00C2C2" opacity="0.9"/>
  <line x1="18.5" y1="14" x2="20.5" y2="10" stroke="#00C2C2" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Letter E -->
  <rect x="22" y="7" width="2.5" height="12" rx="1" fill="#eef4f4"/>
  <rect x="22" y="7" width="6" height="2.5" rx="1" fill="#eef4f4"/>
  <rect x="22" y="12" width="5" height="2" rx="1" fill="#eef4f4"/>
  <rect x="22" y="16.5" width="6" height="2.5" rx="1" fill="#eef4f4"/>
  <!-- Bottom tagline dot -->
  <circle cx="16" cy="27" r="1.5" fill="#00C2C2" opacity="0.7"/>
</svg>
